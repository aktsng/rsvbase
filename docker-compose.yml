services:
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: rsvbase-app
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - mariadb
      - redis
    environment:
      TZ: Asia/Tokyo
    ports:
      - "5173:5173"
    networks:
      - rsvbase-network

  nginx:
    image: nginx:1.25-alpine
    container_name: rsvbase-nginx
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${APP_PORT:-8082}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    environment:
      TZ: Asia/Tokyo
    networks:
      - rsvbase-network

  mariadb:
    image: mariadb:11.4
    container_name: rsvbase-mariadb
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${DB_PORT_HOST:-3308}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-secret}"
      MYSQL_DATABASE: "${DB_DATABASE:-rsvbase}"
      MYSQL_USER: "${DB_USERNAME:-rsvbase}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
      TZ: Asia/Tokyo
    volumes:
      - rsvbase-mariadb-data:/var/lib/mysql
      - ./docker/mariadb/my.cnf:/etc/mysql/conf.d/custom.cnf
    networks:
      - rsvbase-network

  redis:
    image: redis:7-alpine
    container_name: rsvbase-redis
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${REDIS_PORT:-6380}:6379"
    environment:
      TZ: Asia/Tokyo
    networks:
      - rsvbase-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: rsvbase-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - rsvbase-network
    profiles:
      - dev

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: rsvbase-pma
    environment:
      PMA_HOST: mariadb
      PMA_USER: ${DB_USERNAME:-rsvbase}
      PMA_PASSWORD: ${DB_PASSWORD:-secret}
      TZ: Asia/Tokyo
    ports:
      - "8083:80"
    depends_on:
      - mariadb
    networks:
      - rsvbase-network
    profiles:
      - tools

networks:
  rsvbase-network:
    driver: bridge

volumes:
  rsvbase-mariadb-data:
    driver: local
